services:
  - type: web
    name: niddeaw-bmt-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install pdm && pdm install --prod --no-editable
    startCommand: pdm run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "720"
      - key: CORS_ORIGINS
        sync: false
      - key: ENV
        value: production
